<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ping-Pong Phone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020202;
      /* Fondo oscuro consistente con el tótem */
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #connecting-screen {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.4);
      animation: blink-connect 2.4s ease-in-out infinite;
    }

    @keyframes blink-connect {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1.0;
      }
    }

    #error-screen {
      display: none;
      font-size: 11px;
      color: #ff00cc;
      text-align: center;
      padding: 20px;
    }

    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      height: 100%;
      /* Resplandor radial azul oscuro idéntico al del shader del tótem */
      background: radial-gradient(ellipse 80% 50% at 50% 50%, rgba(5, 15, 60, 0.6) 0%, transparent 75%);
    }

    #ping-btn {
      --c1: #ff3300;
      --c2: #ff0066;
      --bg1: rgba(60, 5, 5, 0.85);
      --bg2: rgba(40, 0, 20, 0.85);

      position: relative;
      overflow: hidden;
      width: 80vw;
      max-width: 360px;
      height: 120px;
      border-radius: 24px;

      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      border: 2px solid transparent;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      animation: neon-pulse 3s ease-in-out infinite;
      transition: transform 0.1s ease-out, opacity 0.2s, background 0.6s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;

      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
    }

    @keyframes neon-pulse {

      0%,
      100% {
        border-color: var(--c1);
        box-shadow: 0 0 24px var(--c1), inset 0 0 12px color-mix(in srgb, var(--c1) 30%, transparent);
      }

      50% {
        border-color: var(--c2);
        box-shadow: 0 0 24px var(--c2), inset 0 0 12px color-mix(in srgb, var(--c2) 30%, transparent);
      }
    }

    #btn-label {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
      pointer-events: none;
      transition: text-shadow 0.5s ease, color 0.5s ease;
    }

    #room-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.15em;
    }

    #corner-br {
      position: fixed;
      bottom: 20px;
      right: 24px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.15em;
      display: none;
      /* shown in State 2 */
      align-items: center;
      gap: 8px;
    }

    #corner-br .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff87;
      box-shadow: 0 0 8px #00ff87;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 0.7;
      }

      50% {
        opacity: 1;
      }
    }

    #corner-br .label {
      color: rgba(255, 255, 255, 0.5);
      font-weight: bold;
    }

    /* Ripple animation */
    .ripple {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.15);
      /* Ripple más brillante */
      animation: ripple-expand 400ms ease-out forwards;
    }

    @keyframes ripple-expand {
      from {
        transform: scale(0);
        opacity: 1;
      }

      to {
        transform: scale(4.5);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div id="connecting-screen">CONNECTING...</div>
  <div id="error-screen"></div>
  <div id="game-screen">
    <button id="ping-btn"><span id="btn-label">ENVIAR PULSO</span></button>
    <div id="room-label"></div>
  </div>
  <div id="corner-br">
    <span class="dot"></span>
    <span class="label">CONNECTED</span>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // --- roomId from URL ---
    const roomId = new URLSearchParams(window.location.search).get('room');
    const connectScreen = document.getElementById('connecting-screen');
    const errorScreen = document.getElementById('error-screen');
    const gameScreen = document.getElementById('game-screen');
    const pingBtn = document.getElementById('ping-btn');
    const btnLabel = document.getElementById('btn-label');
    const roomLabel = document.getElementById('room-label');
    const cornerBr = document.getElementById('corner-br');

    let pingTimestamp = null;

    if (!roomId) {
      connectScreen.style.display = 'none';
      errorScreen.style.display = 'block';
      errorScreen.textContent = 'Error: No room ID in URL.';
    } else {
      const socket = io({ transports: ['websocket'] });

      socket.on('connect', () => {
        socket.emit('phone:join', { roomId });
      });

      const STATE_LABELS = {
        locked:   'DESBLOQUEAR',
        unlocked: 'ACTIVAR',
        active:   'REVELAR PREMIO',
        result:   'REINICIAR',
      };

      const STATE_STYLES = {
        locked:   { c1: '#ff3300', c2: '#ff0066', bg1: 'rgba(60,5,5,0.85)',   bg2: 'rgba(40,0,20,0.85)',  glow: 'rgba(255,51,0,0.7)'   },
        unlocked: { c1: '#00ff88', c2: '#00ffcc', bg1: 'rgba(0,40,20,0.85)',  bg2: 'rgba(0,30,25,0.85)',  glow: 'rgba(0,255,136,0.7)'  },
        active:   { c1: '#00f0ff', c2: '#aa00ff', bg1: 'rgba(0,20,50,0.85)',  bg2: 'rgba(30,0,60,0.85)',  glow: 'rgba(0,240,255,0.7)'  },
        result:   { c1: '#ffdd00', c2: '#ff6600', bg1: 'rgba(50,30,0,0.85)',  bg2: 'rgba(40,15,0,0.85)',  glow: 'rgba(255,221,0,0.7)'  },
      };

      const STATE_TRANSITIONS = {
        locked: 'unlocked',
        unlocked: 'active',
        active: 'result',
        result: 'locked',
      };

      let phoneState = 'locked';

      function applyPhoneState(state) {
        const s = STATE_STYLES[state];
        if (!s) return;
        pingBtn.style.setProperty('--c1', s.c1);
        pingBtn.style.setProperty('--c2', s.c2);
        pingBtn.style.setProperty('--bg1', s.bg1);
        pingBtn.style.setProperty('--bg2', s.bg2);
        btnLabel.textContent = STATE_LABELS[state];
        btnLabel.style.textShadow = `0 0 12px ${s.glow}, 0 0 4px rgba(255,255,255,0.5)`;
        // Restart animation to snap new colors immediately
        pingBtn.style.animation = 'none';
        void pingBtn.offsetWidth;
        pingBtn.style.animation = '';
      }

      socket.on('server:joined', () => {
        connectScreen.style.display = 'none';
        errorScreen.style.display = 'none';
        gameScreen.style.display = 'flex';
        cornerBr.style.display = 'flex';
        roomLabel.textContent = 'ROOM \u00B7 ' + roomId;
        phoneState = 'locked';
        applyPhoneState('locked');
      });

      socket.on('server:error', ({ message }) => {
        connectScreen.style.display = 'none';
        gameScreen.style.display = 'none';
        cornerBr.style.display = 'none';
        errorScreen.style.display = 'block';
        errorScreen.textContent = 'Error: ' + message;
      });

      socket.on('disconnect', () => {
        if (pingBtn.disabled) {
          pingTimestamp = null;
          pingBtn.disabled = false;
          pingBtn.style.opacity = '1';
          pingBtn.style.pointerEvents = 'auto';
        }
        gameScreen.style.display = 'none';
        cornerBr.style.display = 'none';
        connectScreen.style.display = 'block';
      });

      // --- Press sequence ---
      let ghostTimeout = null;

      function handlePress(event) {
        if (pingBtn.disabled) return;

        pingTimestamp = Date.now();
        pingBtn.disabled = true;
        pingBtn.style.pointerEvents = 'none';
        socket.emit('phone:ping', { roomId });

        // Step 1: Impact flash (hundimiento y brillo intenso)
        pingBtn.style.transform = 'scale(0.92)';
        pingBtn.style.background = 'rgba(255, 255, 255, 0.2)';
        setTimeout(() => {
          pingBtn.style.transform = '';
          pingBtn.style.background = ''; // Vuelve al oscuro del CSS
        }, 80);

        // Step 2: Internal ripple
        const rect = pingBtn.getBoundingClientRect();
        let rippleX, rippleY;
        if (event.clientX !== undefined && event.clientX !== 0) {
          rippleX = event.clientX - rect.left;
          rippleY = event.clientY - rect.top;
        } else if (event.touches && event.touches.length > 0) {
          rippleX = event.touches[0].clientX - rect.left;
          rippleY = event.touches[0].clientY - rect.top;
        } else {
          rippleX = rect.width / 2;
          rippleY = rect.height / 2;
        }
        const size = Math.max(rect.width, rect.height);
        const ripple = document.createElement('div');
        ripple.classList.add('ripple');
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.left = (rippleX - size / 2) + 'px';
        ripple.style.top = (rippleY - size / 2) + 'px';
        pingBtn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());

        // Step 3: Chromatic ghost en el texto
        setTimeout(() => {
          btnLabel.style.textShadow = '3px 0 rgba(255,0,204,0.9), -3px 0 rgba(0,240,255,0.9)';
          btnLabel.style.color = '#ffffff';
          ghostTimeout = setTimeout(() => {
            const s = STATE_STYLES[phoneState];
            btnLabel.style.textShadow = s ? `0 0 12px ${s.glow}, 0 0 4px rgba(255,255,255,0.5)` : '0 0 8px rgba(255,255,255,0.4)';
            ghostTimeout = null;
          }, 300);
        }, 60);

        // In-flight state
        pingBtn.style.opacity = '0.4';
      }

      pingBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handlePress(e); }, { passive: false });
      pingBtn.addEventListener('click', handlePress);

      socket.on('server:pong', () => {
        if (!pingTimestamp) return;
        const latencyMs = Date.now() - pingTimestamp;
        socket.emit('phone:latency', { roomId, latencyMs });

        // Avanzar estado local y actualizar UI
        phoneState = STATE_TRANSITIONS[phoneState] || 'locked';
        applyPhoneState(phoneState);

        // Feedback háptico
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);

        // Re-enable button
        pingBtn.disabled = false;
        pingBtn.style.opacity = '1';
        pingBtn.style.pointerEvents = 'auto';
      });
    }
  </script>
</body>

</html>
